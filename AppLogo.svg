<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Outer Gold Metallic Gradient -->
    <linearGradient id="outerGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dfc264" />
      <stop offset="50%" stop-color="#916b1e" />
      <stop offset="100%" stop-color="#fffbc4" />
    </linearGradient>

    <!-- Inner Gold Ridge Gradient -->
    <linearGradient id="innerGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#805e19" />
      <stop offset="50%" stop-color="#ecd89b" />
      <stop offset="100%" stop-color="#513909" />
    </linearGradient>

    <!-- Core Canvas Radial Dark Blue/Black Gradient -->
    <radialGradient id="bgRadialGrad" cx="50%" cy="10%" r="80%">
      <stop offset="0%" stop-color="#15314f" />
      <stop offset="80%" stop-color="#06101c" />
      <stop offset="100%" stop-color="#04080e" />
    </radialGradient>

    <!-- Rising Bars Neon Cyan Gradient -->
    <linearGradient id="neonCyanGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="4" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Leather Fine Texture Pattern overlay -->
    <pattern id="leatherTexture" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#ffffff" fill-opacity="0.04" />
    </pattern>
  </defs>

  <!-- Outer Rounded Gold Frame (22% corner radius approx 112px) -->
  <rect x="12" y="12" width="488" height="488" rx="108" fill="url(#outerGoldGrad)" />

  <!-- Inner Gold Ridge Edge -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#innerGoldGrad)" />

  <!-- Dark Bezel Frame -->
  <rect x="25" y="25" width="462" height="462" rx="95" fill="#070b13" />

  <!-- Main Canvas Shield with Blue Radial Depth -->
  <rect x="32" y="32" width="448" height="448" rx="88" fill="url(#bgRadialGrad)" />

  <!-- Fine Leather Pattern Texture -->
  <rect x="32" y="32" width="448" height="448" rx="88" fill="url(#leatherTexture)" pointer-events="none" />

  <!-- Neon Glowing Rising Charts Group -->
  <g filter="url(#neon-glow)">
    <!-- Bar 1 (24% Height) -->
    <rect x="100" y="333" width="46" height="67" rx="6" fill="url(#neonCyanGrad)" />
    
    <!-- Bar 2 (40% Height) -->
    <rect x="166" y="288" width="46" height="112" rx="6" fill="url(#neonCyanGrad)" />
    
    <!-- Bar 3 (56% Height) -->
    <rect x="232" y="243" width="46" height="157" rx="6" fill="url(#neonCyanGrad)" />
    
    <!-- Bar 4 (72% Height) -->
    <rect x="298" y="198" width="46" height="202" rx="6" fill="url(#neonCyanGrad)" />
    
    <!-- Bar 5 (90% Height) -->
    <rect x="364" y="148" width="46" height="252" rx="6" fill="url(#neonCyanGrad)" />
  </g>

  <!-- Glossy Diagonal Highlight Overlay Sheen -->
  <path d="M 32 32 L 256 32 L 32 480 Z" fill="url(#bgRadialGrad)" opacity="0" />
  <!-- Realistic Diagonal Sheen Path (Skins Left Section) -->
  <path d="M 32 32 L 200 32 L 32 480 Z" fill="#ffffff" opacity="0.03" pointer-events="none" />
</svg>
